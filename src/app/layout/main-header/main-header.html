<header>
    <div class="menu-bar content">
        <nav class="menu">
            <p class="menu__logo">&lt;MS&gt;</p>
            <ul class="menu__system">
                <li><a href="#why-me">{{ 'NAV.WHY_ME' | translate }}</a></li>
                <li><a href="#skills">{{ 'NAV.SKILLS' | translate }}</a></li>
                <li><a href="#projects">{{ 'NAV.PROJECTS' | translate }}</a></li>
                <li><a href="#contact">{{ 'NAV.CONTACT' | translate }}</a></li>
            </ul>
        </nav>

        <div class="language-container">
            <div class="language-container">
                <button class="language-container__button"

                <p>|</p>
                <button class="language-container__button" (click)="switchLang('en')"
                [ngClass]="getLangClass('en')">EN</button>
            </div>
        </div>
    </div>
